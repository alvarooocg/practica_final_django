{% extends 'base.html' %}
{% block title %}Eliminar actividad{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-12">
    <div class="bg-white rounded-2xl shadow p-8 text-center">
        <div class="text-5xl mb-4">⚠️</div>
        <h1 class="text-xl font-bold text-gray-800 mb-2">¿Eliminar esta actividad?</h1>
        <p class="text-gray-600 mb-6">«<strong>{{ objeto }}</strong>» será eliminada permanentemente.</p>
        <form method="post" class="flex justify-center gap-4">
            {% csrf_token %}
            <button type="submit" class="bg-red-600 text-white px-6 py-2 rounded-lg hover:bg-red-700 transition">Eliminar</button>
            <a href="{% url 'actividades_lista' %}" class="bg-gray-200 text-gray-700 px-6 py-2 rounded-lg hover:bg-gray-300 transition">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
